name: Deploy Vibrnt Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'vibrnt/**'
      - '.github/workflows/vibrnt-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy-vibrnt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static dashboard
        run: node vibrnt/build-static.js

      - name: Inject dashboard HTML into Worker (base64)
        run: |
          python3 << 'PYEOF'
          import base64, re
          # Read the built dashboard HTML
          with open('vibrnt/dist/index.html') as f:
              dashboard_html = f.read()
          # Read the worker script
          with open('vibrnt/workers/auth.js') as f:
              js = f.read()
          # Encode as base64 to avoid JS template literal escaping issues
          b64 = base64.b64encode(dashboard_html.encode('utf-8')).decode('ascii')
          # Replace the base64-encoded placeholder
          old_pattern = "const DASHBOARD_B64 = '';"
          new_pattern = "const DASHBOARD_B64 = '" + b64 + "';"
          if old_pattern in js:
              js = js.replace(old_pattern, new_pattern)
              with open('vibrnt/workers/auth.js', 'w') as f:
                  f.write(js)
              print('Dashboard injected as base64 (' + str(len(b64)) + ' chars)')
          else:
              print('ERROR: DASHBOARD_B64 marker not found')
              exit(1)
          PYEOF

      - name: Deploy to Cloudflare Workers
        run: |
          cd vibrnt/workers
          npx wrangler deploy --name vibrnt-worker --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "✅ Vibrnt dashboard live at: https://aloomii.com/vibrnt"
          echo ""
          echo "🔐 First-time setup (set your password):"
          echo "   Go to: Cloudflare Dashboard > Workers & Pages > vibrnt-worker > Settings > Variables"
          echo "   Add: VIBRNT_PASS = your-password"
          echo ""
          echo "   Default password (until changed): vibrnt2026"
