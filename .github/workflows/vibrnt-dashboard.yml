name: Deploy Vibrnt Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'vibrnt/**'
      - '.github/workflows/vibrnt-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy-vibrnt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static dashboard
        run: node vibrnt/build-static.js

      - name: Create or verify Cloudflare Pages project
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          echo "Checking if project 'vibrnt' exists..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/vibrnt" -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json")
          echo "Project check HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "404" ]; then
            echo "Creating Cloudflare Pages project 'vibrnt'..."
            curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"name":"vibrnt","slug":"vibrnt","build_config":{"destination_dir":""},"production_branch":"main","source":{"type":"github"}}'
            echo "Project creation attempted."
          else
            echo "Project already exists (HTTP $HTTP_CODE)."
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy vibrnt/dist --project-name=vibrnt --branch=main --commit-dirty=true

      - name: Summary
        run: |
          echo "✅ Vibrnt dashboard deployed at: https://aloomii.com/vibrnt"
          echo "🔐 Set VIBRNT_DASHBOARD_PASS in Cloudflare Pages dashboard (Settings > Environment variables > Production)"
          echo "   Default dev password (until changed): vibrnt2026"
