name: Deploy Vibrnt Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'vibrnt/**'
      - '.github/workflows/vibrnt-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy-vibrnt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static dashboard
        run: node vibrnt/build-static.js

      - name: Inject dashboard HTML into Worker
        run: |
          python3 << 'PYEOF'
          import json, os, re

          # Read the built HTML
          with open('vibrnt/dist/index.html', 'r') as f:
              html = f.read()

          # Escape template literal special chars so they don't break JS template literal
          escaped = html.replace('`', '\\`').replace('${', '\\${')

          # Read the worker
          with open('vibrnt/workers/auth.js', 'r') as f:
              js = f.read()

          # Find the marker line and replace it
          marker = 'const DASHBOARD_HTML = `<!-- DASHBOARD_HTML_REPLACED_AT_BUILD -->`;'
          if marker not in js:
              print('ERROR: marker not found in auth.js')
              exit(1)

          replacement = 'const DASHBOARD_HTML = `' + escaped + '`;'
          js = js.replace(marker, replacement)

          with open('vibrnt/workers/auth.js', 'w') as f:
              f.write(js)

          print(f'Dashboard injected ({len(html)} chars)')
          PYEOF

      - name: Deploy to Cloudflare Workers
        run: |
          cd vibrnt/workers
          npx wrangler deploy --name vibrnt-worker --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "✅ Vibrnt dashboard live at: https://aloomii.com/vibrnt"
          echo ""
          echo "🔐 First-time setup (set your password):"
          echo "   1. Go to: https://dash.cloudflare.com > Workers & Pages > vibrnt-worker > Settings > Variables"
          echo "   2. Add variable: VIBRNT_PASS = your-password"
          echo "   3. Done!"
          echo ""
          echo "   Default password (until changed): vibrnt2026"