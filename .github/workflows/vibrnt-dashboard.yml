name: Deploy Vibrnt Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'vibrnt/**'
      - '.github/workflows/vibrnt-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy-vibrnt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static dashboard
        run: node vibrnt/build-static.js

      - name: Inject dashboard HTML into Worker
        run: |
          python3 << 'PYEOF'
          import json, os, re
          with open('vibrnt/dist/index.html') as f:
              html = f.read()
          with open('vibrnt/workers/auth.js') as f:
              js = f.read()
          marker = 'const DASHBOARD_HTML = `<!-- DASHBOARD_HTML_REPLACED_AT_BUILD -->`;'
          replacement = 'const DASHBOARD_HTML = `' + html + '`;'
          js = js.replace(marker, replacement)
          with open('vibrnt/workers/auth.js', 'w') as f:
              f.write(js)
          print('Dashboard injected into Worker')
          PYEOF

      - name: Deploy to Cloudflare Workers
        run: |
          cd vibrnt/workers
          npx wrangler deploy --name vibrnt-worker --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "✅ Vibrnt dashboard live at: https://aloomii.com/vibrnt"
          echo ""
          echo "🔐 First-time setup (set your password):"
          echo "   Go to: Cloudflare Dashboard > Workers & Pages > vibrnt-worker > Settings > Variables"
          echo "   Add: VIBRNT_PASS = your-password"
          echo ""
          echo "   Default password (until changed): vibrnt2026"
