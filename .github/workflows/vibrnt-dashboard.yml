name: Deploy Vibrnt Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'vibrnt/**'
      - '.github/workflows/vibrnt-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy-vibrnt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy vibrnt --project-name=vibrnt --branch=main

      - name: Set Cloudflare Access password policy
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          APP_NAME="vibrnt"

          # Check if Access app already exists
          APP_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/access/apps?name=${APP_NAME}" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Content-Type: application/json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['results'][0]['id'] if d['results'] else '')")

          if [ -z "$APP_ID" ]; then
            echo "Creating Access app..."
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/access/apps" \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "'"$APP_NAME"'",
                "domain": "aloomii.com",
                "subdomain": "aloomii.com",
                "path": "/vibrnt",
                "policy": {
                  "name": "Password Protected",
                  "exclude": [],
                  "include": [{"type": "email"}],
                  "session_duration": "24h"
                },
                "allowed_idps": [],
                "enable一次_pin": false
              }'
          fi

          echo "Vibrnt dashboard deployed at https://aloomii.com/vibrnt"
          echo "Password: check GitHub Actions secrets (VIBRNT_DASHBOARD_PASS)"
