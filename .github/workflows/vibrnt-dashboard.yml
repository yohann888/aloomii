name: Deploy Vibrnt Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'vibrnt/**'
      - '.github/workflows/vibrnt-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy-vibrnt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build static dashboard
        run: |
          cd vibrnt
          node build-static.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy vibrnt/dist --project-name=vibrnt --branch=main

      - name: Set password environment variable
        run: |
          echo "📋 Set VIBRNT_DASHBOARD_PASS in Cloudflare Pages dashboard:"
          echo "   → Pages → vibrnt → Settings → Environment variables"
          echo "   → Production variable: VIBRNT_DASHBOARD_PASS = your-password"
          echo "   → Default dev password (until changed): vibrnt2026"
          echo ""
          echo "✅ Dashboard live at: https://aloomii.com/vibrnt"
