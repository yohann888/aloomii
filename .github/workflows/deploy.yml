name: Deploy to Cloudflare Pages

# IMPORTANT: Do NOT use wrangler pages deploy directly.
# This workflow exists only as a placeholder.
# The actual deployment is handled by Cloudflare Pages Git integration.
# See SOP in MEMORY.md: "NEVER run wrangler pages deploy directly"

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deployment note
        run: |
          echo "✅ Changes pushed to main."
          echo "Cloudflare Pages should automatically deploy from Git integration."
          echo "If changes are not appearing, hard refresh or purge cache in Cloudflare."
