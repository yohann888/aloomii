  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #6366f1;
      --accent-dim: #4f51d4;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      background: var(--surface);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .week-badge {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .hero {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 32px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 15px;
      color: var(--text-dim);
      max-width: 520px;
    }

    .winner-banner {
      max-width: 960px;
      margin: 0 auto 32px;
      padding: 0 24px;
    }

    .winner-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 24px;
    }

    .winner-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .winner-type {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .winner-summary {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 680px;
    }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    .section {
      margin-bottom: 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .cards-grid {
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: var(--accent-dim);
    }

    .card-rank {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-text {
      font-size: 16px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .metric-value {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
    }

    .metric-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-source {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .fail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .fail-icon {
      color: var(--red);
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .fail-text {
      font-size: 14px;
      color: var(--text-dim);
    }

    .fail-reason {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Trending Topics ──────────────────────────────────────────────── */
    .topic-grid {
      display: grid;
      gap: 10px;
    }

    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0 16px;
      align-items: start;
    }

    .topic-heat {
      font-size: 18px;
      line-height: 1.4;
    }

    .topic-body {}

    .topic-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .topic-hook {
      font-size: 13px;
      color: var(--accent);
      font-style: italic;
      margin-bottom: 6px;
    }

    .topic-why {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .topic-stats {
      text-align: right;
      white-space: nowrap;
    }

    .topic-stat {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      display: block;
    }

    /* ── Caption Toolkit ──────────────────────────────────────────────── */
    .caption-grid {
      display: grid;
      gap: 10px;
    }

    .caption-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }

    .caption-card:hover { border-color: var(--accent-dim); }

    .caption-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .caption-chars {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .caption-copy {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
    }

    .caption-copy:hover { color: var(--text); }

    .hashtag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .hashtag-pill {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 99px;
      font-family: var(--mono);
    }

    .hashtag-pill.good {
      background: rgba(34,197,94,0.1);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.25);
    }

    .hashtag-pill.bad {
      background: rgba(239,68,68,0.08);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
      text-decoration: line-through;
      opacity: 0.7;
    }

    .hashtag-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .hashtag-tooltip {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Platform Trends ──────────────────────────────────────────────── */
    .platform-grid {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 640px) {
      .platform-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .platform-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .platform-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .platform-trend {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .platform-proof {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      margin-bottom: 6px;
    }

    .platform-thumb {
      font-size: 12px;
      color: var(--text-muted);
    }

    .breakout-card {
      background: linear-gradient(135deg, #0f1a0f 0%, #0d1a10 100%);
      border: 1px solid rgba(34,197,94,0.4);
      border-radius: 10px;
      padding: 20px;
      margin-top: 12px;
    }

    .breakout-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
      margin-bottom: 8px;
    }

    .breakout-format {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .breakout-proof {
      font-size: 13px;
      color: var(--text-dim);
    }

    .breakout-proof strong {
      color: var(--green);
      font-family: var(--mono);
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }

    .empty-state h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text-dim);
    }

    .error-state {
      text-align: center;
      padding: 64px 24px;
    }

    .error-state h2 {
      font-size: 18px;
      color: var(--red);
      margin-bottom: 8px;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
    }

    .footer a {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
    }

    .footer a:hover { color: var(--text-dim); }

    @media (min-width: 640px) {
      .hero h1 { font-size: 34px; }
      .winner-type { font-size: 26px; }
    }
  </style>
</head>

lips","reason":"Ideal for clips; high discoverability in podcast niche, low saturation"},{"tag":"#InvestingTips","reason":"Strong for investing clips; practical advice drives shares/views"},{"tag":"#EntrepreneurMindset","reason":"Perfect for motivational entrepreneur interviews; mindset content explodes on X"},{"tag":"#FinancialFreedom","reason":"Wealth mindset gold; evergreen reach for finance podcasts"},{"tag":"#WealthBuilding","reason":"Niche wealth tips; pairs well with investing/AI clips"},{"tag":"#MoneyMindset","reason":"High engagement for mindset shifts; less crowded than #Motivation"},{"tag":"#Geopolitics","reason":"Niche reach for global strategy clips; timely with 2026 tensions"},{"tag":"#Geostrategy","reason":"Deeper geopolitics angle; expert-level engagement"}],"avoid":[{"tag":"#Investing","reason":"Oversaturated"},{"tag":"#AI","reason":"Oversaturated"},{"tag":"#Entrepreneur","reason":"Oversaturated"},{"tag":"#Business","reason":"Oversaturated"},{"tag":"#Motivation","reason":"Oversaturated"},{"tag":"#Success","reason":"Oversaturated"},{"tag":"#Podcast","reason":"Oversaturated"}]},"platformTrends":[{"platform":"X","trend":"On X this week (week of 2026-03-30), #AINativeGTM trends #3 among B2B circles with 45K posts; @shl (Shlomi, 12","proof":"45K posts","thumbnailTip":null},{"platform":"YouTube","trend":"I Built [AI Tool] in 24 Hours - $XK Revenue Day 1","proof":"25M views","thumbnailTip":null}],"breakoutAngle":{"format":"AI Fail Compilations  Pivot Wins","proof":"4.2M views in 3 days"},"archive":[]};

        if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
        return n.toString();
      }

      function render(data) {
        if (!data || !data.schemaVersion) {

          html += '<div class="card-meta">';

              html += '<div class="hashtag-label" style="margin-top:12px">❌ Avoid (oversaturated)</div>';
              html += '<div class="hashtag-row">';
              hashAvoid.forEach(h => {
                html += '<span class="hashtag-pill bad">' + esc(h.tag) + '</span>';
              });
              html += '</div>';
            }
            html += '<div class="hashtag-tooltip">Hover any tag for details. Use 2-4 per post: one broad + 1-2 niche + #PodcastClips</div>';
            html += '</div>';
          }

          html += '</div>';
        }

        // ── Priority 4: Platform Trends ───────────────────────────────────
        const platforms    = Array.isArray(data.platformTrends) ? data.platformTrends : [];
        const breakout     = data.breakoutAngle;

        if (platforms.length > 0 || breakout) {
          html += '<div class="section"><div class="section-header"><span class="section-title">📊 Platform Trends</span><div class="section-line"></div></div>';

          if (platforms.length > 0) {
            html += '<div class="platform-grid">';
            platforms.forEach(p => {
              html += '<div class="platform-card">';
              html += '<div class="platform-name">' + esc(p.platform) + '</div>';
              html += '<div class="platform-trend">' + esc(p.trend) + '</div>';
              if (p.proof) html += '<div class="platform-proof">' + esc(p.proof) + '</div>';
              if (p.thumbnailTip) html += '<div class="platform-thumb">Thumbnail: ' + esc(p.thumbnailTip) + '</div>';
              html += '</div>';
            });
            html += '</div>';
          }

          if (breakout) {
            html += '<div class="breakout-card">';
            html += '<div class="breakout-label">💡 Breakout Angle — Underutilized This Week</div>';
            html += '<div class="breakout-format">' + esc(breakout.format) + '</div>';
            html += '<div class="breakout-proof"><strong>' + esc(breakout.proof) + '</strong> — &lt;5% of videos use this. Early mover wins.</div>';
            html += '</div>';
          }

          html += '</div>';
        }

        html += '</div>';
        app.innerHTML = html;
      }

      function esc(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      try {
        if (typeof window.__PBN_TRENDS_DATA__ !== 'undefined') {
          render(window.__PBN_TRENDS_DATA__);
        } else {
          app.innerHTML = '<div class="main"><div class="error-state"><h2>Data failed to load</h2><p>The data injection did not complete. This is a build issue.</p></div></div>';
        }
      } catch(e) {
        app.innerHTML = '<div class="main"><div class="error-state"><h2>Data failed to load</h2><p>' + e.message + '</p></div></div>';
      }
    })();

    function copyCaption(btn) {
      const card = btn.closest('.caption-card');
      const text = card.getAttribute('data-text');
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.style.color = '#22c55e';
        setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1800);
      });
    }
  </script>
</body>
</html>
