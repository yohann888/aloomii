<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibrnt — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo { font-size: 28px; font-weight: 700; margin-bottom: 28px; color: #e040fb; text-align: center; }
    .logo span { color: #00e5ff; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; text-align: center; }
    p { font-size: 13px; color: #8888a0; text-align: center; margin-bottom: 28px; }
    label { display: block; font-size: 11px; color: #8888a0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #e040fb; }
    button {
      width: 100%;
      padding: 13px;
      background: #e040fb;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c030e0; }
    .error { color: #ff4d6a; font-size: 12px; text-align: center; margin-top: 12px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">vibrnt<span>.ai</span></div>
    <h1>Operations Dashboard</h1>
    <p>Enter your access password to continue</p>
    <form action="/vibrnt/auth" method="POST" id="login-form">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      <input type="hidden" name="ref" id="ref-input" value="/vibrnt/">
      <button type="submit" id="submit-btn">Sign In</button>
    </form>
    <div class="error" id="error-msg">Incorrect password. Try again.</div>
  </div>

  <script>
    // Inject ref from URL param into hidden field before submit
    var refInput = document.getElementById('ref-input');
    var urlRef = new URLSearchParams(window.location.search).get('ref');
    if (urlRef) refInput.value = urlRef;

    // Show error if coming back from failed auth
    if (new URLSearchParams(window.location.search).has('error')) {
      document.getElementById('error-msg').classList.add('show');
    }
  </script>
</body>
</html>
