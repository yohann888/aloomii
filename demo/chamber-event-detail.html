<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Detail</title>
  <link rel="stylesheet" href="/demo/chamber-ui.css" />
</head>
<body>
  <div class="shell">
    <div class="utility-bar">
      <span>(905) 765-0330</span>
      <div class="divider"></div>
      <a href="mailto:hello@caledoniachamberdemo.ca">Contact</a>
      <div class="divider"></div>
      <a href="/chamber-demo/member-login">Member Login →</a>
      <div class="divider"></div>
      <a href="/chamber-demo/admin">Admin</a>
    </div>
    <header class="main-header">
      <div class="header-inner">
        <a class="brand-block" href="/chamber-demo">
          <div class="logo-container">
            <img src="/demo/assets/caledonia-chamber-logo-new.svg" alt="Caledonia Regional Chamber of Commerce logo" />
          </div>
          <div class="brand-info">
            <h2 class="brand-name">Caledonia <span class="regional">Regional</span></h2>
            <span class="brand-tagline">Chamber of Commerce</span>
          </div>
        </a>
        <nav class="main-nav">
          <a class="nav-link " href="/chamber-demo">Home</a>
          <a class="nav-link " href="/chamber-demo/directory">Directory</a>
          <a class="nav-link active" href="/chamber-demo/events">Events</a>
          <a class="btn-join" href="/chamber-demo/join">Join the Chamber</a>
        </nav>
        <button class="nav-toggle">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>
    <p><a href="/chamber-demo/events">← Back to events</a></p>
    <div class="card">
      <div class="pill" id="visibility"></div>
      <h1 id="title"></h1>
      <p class="muted" id="whenWhere"></p>
      <p id="description" class="muted" style="font-size:16px; line-height:1.6"></p>
      <a class="btn" href="/chamber-demo/join">Register interest</a>
    </div>
  </div>
  <script>
    const slug = location.pathname.split('/').pop();
    fetch(`/api/chamber-demo/events/${slug}`).then(r => r.json()).then(data => {
      const event = data.event;
      document.title = event.title;
      document.getElementById('visibility').textContent = event.member_only ? 'Members only' : 'Public event';
      document.getElementById('title').textContent = event.title;
      document.getElementById('whenWhere').textContent = `${new Date(event.starts_at).toLocaleString()} · ${event.location || ''}`;
      document.getElementById('description').textContent = event.description || '';
    });
  </script>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', () => {
      document.querySelector('.main-nav').classList.toggle('show');
    });
  </script>

  <script src="/demo/chamber-ui.js"></script>
</body>
</html>
